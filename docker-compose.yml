services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3847:3847"
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_PROXY=http://api:3847
    restart: unless-stopped