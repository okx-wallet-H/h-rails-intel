# fly launch 后按需修改 app 名
app = "h-rails-intel"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "3847"
  NODE_ENV = "production"

[http_service]
  internal_port = 3847
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"